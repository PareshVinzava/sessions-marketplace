[pytest]
DJANGO_SETTINGS_MODULE = config.settings.docker
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = apps,config
omit =
    */migrations/*
    */management/commands/seed_data.py
    */wsgi.py
    config/settings/dev.py

[coverage:report]
fail_under = 80
show_missing = true
